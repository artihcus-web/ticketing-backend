version: '3.8'

services:
  backend:
    image: ${DOCKERHUB_USERNAME:-artihcus}/articket-backend:latest
    container_name: articket-backend
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - PORT=${PORT:-5000}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
    networks:
      - articket-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PORT:-5000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  articket-network:
    driver: bridge


